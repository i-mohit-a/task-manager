<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        body {
            font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Mono", "Droid Sans Mono", monospace;
            font-size: 14px;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 60px;
            background: #ffffff;
            color: #000000;
        }

        a {
            color: #000000;
            text-decoration: underline;
        }

        a:hover {
            text-decoration: none;
        }

        h1 {
            font-size: 18px;
            margin: 0;
            padding: 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #000;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        .project-header {
            font-size: 16px;
            margin-top: 24px;
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .sort-controls {
            font-size: 11px;
        }

        .sort-controls a {
            margin-left: 8px;
            color: #555;
        }

        .sort-controls a:hover {
            color: #000;
        }

        .sort-input {
            font-family: inherit;
            font-size: 11px;
            padding: 2px 4px;
            border: 1px solid #000;
            width: 80px;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-list .task-list {
            margin-top: 0;
        }

        .task-item {
            padding: 0;
        }

        .task-row {
            padding: 4px 0;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        body:not(.show-lines) .task-row {
            padding-top: 2px;
            padding-bottom: 2px;
        }

        body.show-lines .task-row {
            border-bottom: 1px dotted #000;
        }

        .task-row:hover {
            border-bottom: 1px dotted #000;
        }

        .task-content {
            flex: 1;
            overflow-wrap: break-word;
            word-break: break-word;
            min-width: 0;
        }

        .actions-right {
            font-size: 10px;
            white-space: nowrap;
            margin-left: 12px;
            color: #555;
            display: flex;
            gap: 3px;
            align-items: baseline;
        }

        .actions-right a {
            color: #555;
            text-decoration: none;
        }

        .actions-right a:hover {
            color: #000;
            text-decoration: none;
        }

        .task-row.completed {
            color: #666;
        }

        .task-row.completed .task-content {
            text-decoration: line-through;
        }

        .indent-1 { padding-left: 24px; }
        .indent-2 { padding-left: 48px; }
        .indent-3 { padding-left: 72px; }

        .priority-badge {
            padding: 1px 4px;
            font-size: 12px;
            margin-left: 4px;
        }

        .priority-critical { color: #000; }
        .priority-critical::before { content: "[C] "; }
        .priority-major { color: #000; }
        .priority-major::before { content: "[M] "; }
        .priority-minor { display: none; }

        .flag {
            padding: 1px 4px;
            font-size: 12px;
            margin-left: 4px;
            border: 1px solid #000;
        }

        .flag-color-0,
        .flag-color-1,
        .flag-color-2,
        .flag-color-3,
        .flag-color-4,
        .flag-color-5,
        .flag-color-6,
        .flag-color-7 { background: #fff; color: #000; }

        .meta {
            color: #555;
            font-size: 12px;
        }

        .meta.date {
            margin-left: 8px;
            color: #555;
        }

        .meta.done-date {
            color: #555;
        }

        [data-meta]::after {
            content: attr(data-meta);
        }

        [data-done-date]::after {
            content: attr(data-done-date);
        }

        .actions {
            font-size: 10px;
        }

        .actions a {
            color: #555;
            text-decoration: none;
        }

        .actions a:hover {
            color: #000;
            text-decoration: none;
        }

        form {
            margin: 16px 0;
            padding: 0;
            background: #ffffff;
            border: 1px solid #000;
        }

        form label {
            display: block;
            margin-bottom: 4px;
        }

        form input[type="text"],
        form input[type="number"],
        form select {
            font-family: inherit;
            font-size: 14px;
            padding: 4px 8px;
            margin-bottom: 8px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
        }

        form button {
            font-family: inherit;
            font-size: 14px;
            padding: 6px 12px;
            color: #fff;
            background: #333;
            border: none;
            cursor: pointer;
        }

        form button:hover {
            background: #555;
        }

        .inline-form {
            display: inline;
        }

        .inline-form input,
        .inline-form button {
            display: inline;
            width: auto;
            margin: 0;
            padding: 2px 8px;
        }

        .quick-add {
            margin: 0;
            padding: 0;
            background: rgba(255,255,255,0.7);
            border: none;
        }

        .quick-add textarea {
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            padding: 4px 0;
            margin: 0;
            border: none;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            resize: none;
            overflow: hidden;
            display: block;
            min-height: 0;
        }

        .quick-add-item {
            list-style: none;
        }

        .inline-edit {
            font-family: inherit;
            font-size: 14px;
            padding: 2px 6px;
            border: 1px solid #000;
            background: #fff;
            width: 500px;
            outline: none;
        }

        .subtask-input-row {
            padding: 4px 0;
            border-bottom: 1px dotted #000;
        }

        .message {
            padding: 8px;
            margin: 8px 0;
            background: #ffffff;
            border: 1px solid #000;
        }

        .nav a {
            margin-left: 16px;
            font-size: 13px;
            color: #555;
        }

        .nav a:hover {
            color: #000;
            text-decoration: none;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            font-size: 10px;
            color: #555;
        }

        .back-link:hover {
            color: #000;
            text-decoration: none;
        }

        .cursor-indicator {
            display: inline-block;
            width: 16px;
        }

        .cursor-indicator::before {
            content: '-';
            color: #555;
        }

        .task-row.cursor .cursor-indicator::before {
            content: '>';
            color: #000;
            font-weight: bold;
        }

        .task-row.selected {
            background: #e0e0e0;
        }

        .task-row.selected .cursor-indicator::before {
            content: '*';
            color: #000;
            font-weight: bold;
        }

        .task-row.cursor.selected .cursor-indicator::before {
            content: '>';
            color: #000;
            font-weight: bold;
        }

        .kbd-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 11px;
            color: #555;
            background: #fff;
            padding: 8px 12px;
            border: 1px solid #000;
        }

        .kbd-hint kbd {
            background: #e8e8e8;
            padding: 1px 4px;
            font-family: inherit;
        }

        .settings-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            font-size: 20px;
            cursor: pointer;
            color: #555;
            background: none;
            border: none;
            padding: 2px 6px;
            font-family: inherit;
            z-index: 100;
        }

        .settings-btn:hover {
            color: #000;
        }

        .settings-dropdown {
            display: none;
            position: fixed;
            top: 40px;
            right: 16px;
            background: #fff;
            border: 1px solid #000;
            padding: 10px 14px;
            font-size: 12px;
            z-index: 100;
            min-width: 160px;
        }

        .settings-dropdown.open {
            display: block;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .settings-row label {
            color: #000;
        }

        .settings-toggle {
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            background: #fff;
            border: 1px solid #000;
            padding: 1px 7px;
            color: #000;
        }

        .settings-toggle.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        body.compact {
            font-size: 11px;
        }

        body.compact h1 {
            font-size: 14px;
        }

        body.compact .page-header {
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        body.compact .project-header {
            font-size: 12px;
            margin-top: 5px;
        }

                body.compact .quick-add textarea {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
    <div class="settings-dropdown" id="settings-dropdown">
        <div class="settings-row">
            <label>Font size</label>
            <button class="settings-toggle" id="compact-toggle">compact</button>
        </div>
        <div class="settings-row" style="margin-top: 8px;">
            <label>Task lines</label>
            <button class="settings-toggle" id="lines-toggle">show</button>
        </div>
    </div>
    <div class="page-header">
        {% block page_heading %}{% endblock %}
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/flags">Flags</a>
            <a href="/archive">Archive</a>
        </nav>
    </div>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
    (function() {
        var btn = document.getElementById('settings-btn');
        var dropdown = document.getElementById('settings-dropdown');
        var compactToggle = document.getElementById('compact-toggle');
        var linesToggle = document.getElementById('lines-toggle');

        if (localStorage.getItem('compact') === '1') {
            document.body.classList.add('compact');
            compactToggle.classList.add('active');
        }

        if (localStorage.getItem('showLines') === '1') {
            document.body.classList.add('show-lines');
            linesToggle.classList.add('active');
        }

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });

        document.addEventListener('click', function() {
            dropdown.classList.remove('open');
        });

        dropdown.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        compactToggle.addEventListener('click', function() {
            var isCompact = document.body.classList.toggle('compact');
            compactToggle.classList.toggle('active', isCompact);
            localStorage.setItem('compact', isCompact ? '1' : '0');
        });

        linesToggle.addEventListener('click', function() {
            var showLines = document.body.classList.toggle('show-lines');
            linesToggle.classList.toggle('active', showLines);
            localStorage.setItem('showLines', showLines ? '1' : '0');
        });
    })();
    </script>
</body>
</html>
